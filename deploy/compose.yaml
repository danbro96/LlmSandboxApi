# Reference Compose for LlmSandboxApi — runs on a DEDICATED low-trust LAN host (NOT MedelyNAS, NOT
# the DMZ). Full bring-up (mini-PC, Docker + gVisor/runsc, firewall) is in DevOps/Guides/sandbox-deploy.md.
#
# Two long-lived services:
#   llm-sandbox-api    — the .NET MCP host. Exposes /mcp on the LAN (X-API-Key, LAN-only, no tunnel).
#                        Dispatches each run to the host engine via the socket-proxy.
#   socket-proxy       — tecnativa/docker-socket-proxy, scoped to ONLY the container/image calls the
#                        runner needs. The API never sees the raw /var/run/docker.sock.
#
# Each run is a throwaway container the host engine creates with the gVisor (runsc) runtime,
# --network none, read-only rootfs, all caps dropped, no-new-privileges, non-root, and mem/cpu/pids
# /time caps (see CodeRunner). Install runsc on the host and keep Sandbox__Runtime=runsc.
services:
  llm-sandbox-api:
    image: danbro96/llm-sandbox-api:${IMAGE_TAG:-latest}
    container_name: llm-sandbox-api
    environment:
      Auth__ApiKeys__0__Key: ${SANDBOX_API_KEY:?required}
      Auth__ApiKeys__0__Name: ${SANDBOX_API_KEY_NAME:-prod}
      RateLimit__RequestsPerMinute: ${RATE_LIMIT:-60}
      # Dispatch to the host engine through the scoped proxy — never the raw socket.
      Sandbox__DockerHost: tcp://socket-proxy:2375
      Sandbox__Runtime: ${SANDBOX_RUNTIME:-runsc}
      Sandbox__MemoryBytes: ${SANDBOX_MEMORY_BYTES:-268435456}
      Sandbox__Cpus: ${SANDBOX_CPUS:-1.0}
      Sandbox__PidsLimit: ${SANDBOX_PIDS:-128}
      Sandbox__MaxConcurrent: ${SANDBOX_MAX_CONCURRENT:-4}
      Sandbox__DefaultTimeoutSeconds: ${SANDBOX_DEFAULT_TIMEOUT:-10}
      Sandbox__MaxTimeoutSeconds: ${SANDBOX_MAX_TIMEOUT:-60}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod,host.name=sandbox-host}
    ports:
      - "${HOST_PORT:-8080}:8080"   # LAN-only — firewall inbound to the assistant host(s); no Cloudflare tunnel route.
    depends_on:
      - socket-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - edge
      - control

  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: sandbox-socket-proxy
    environment:
      # Allow ONLY what the runner uses; everything else stays denied (default 0).
      CONTAINERS: 1   # inspect/create/start/wait/kill/logs/remove
      IMAGES: 1       # inspect + pull language images
      POST: 1         # required for create/start/kill/pull
      PING: 1         # /_ping (engine reachability)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - control

networks:
  edge:
    driver: bridge        # publishes the API port to the LAN
  control:
    driver: bridge
    internal: true        # socket-proxy is reachable only by llm-sandbox-api, never from the LAN
